<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedAI</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cdefs%3E%3ClinearGradient id='inGrad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%233b82f6' /%3E%3Cstop offset='100%25' stop-color='%238b5cf6' /%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='24' height='24' rx='4' fill='url(%23inGrad)' /%3E%3Cpath d='M7.5 18V10H4.5V18H7.5ZM6 8.5C5 8.5 4.2 7.8 4.2 6.8C4.2 5.8 5 5 6 5C7 5 7.8 5.8 7.8 6.8C7.8 7.8 7 8.5 6 8.5ZM19.5 18H16.5V13.8C16.5 12.8 16 12 14.8 12C13.8 12 13.2 12.8 13.2 13.8V18H10.2V10H13.2V11.2C13.8 10.2 15 9.8 16.5 9.8C18.8 9.8 19.5 11.2 19.5 13.5V18Z' fill='%23ffffff' /%3E%3C/svg%3E" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        slate: {
                            850: '#1e293b',
                            900: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen p-6 antialiased selection:bg-blue-500 selection:text-white">

    <div class="max-w-6xl mx-auto space-y-8">
        <!-- Header -->
        <header class="flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight flex items-center gap-3">
                    <svg class="w-8 h-8" viewBox="0 0 24 24">
                        <defs>
                            <linearGradient id="inGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#3b82f6" />
                                <stop offset="100%" stop-color="#8b5cf6" />
                            </linearGradient>
                        </defs>
                        <rect width="24" height="24" rx="4" fill="url(#inGrad)" />
                        <path d="M7.5 18V10H4.5V18H7.5ZM6 8.5C5 8.5 4.2 7.8 4.2 6.8C4.2 5.8 5 5 6 5C7 5 7.8 5.8 7.8 6.8C7.8 7.8 7 8.5 6 8.5ZM19.5 18H16.5V13.8C16.5 12.8 16 12 14.8 12C13.8 12 13.2 12.8 13.2 13.8V18H10.2V10H13.2V11.2C13.8 10.2 15 9.8 16.5 9.8C18.8 9.8 19.5 11.2 19.5 13.5V18Z" fill="#ffffff" />
                    </svg>
                    LinkedAI
                </h1>
                <p class="text-slate-400 mt-2 text-sm">AI-Powered Job Scraper & Automation Pipeline</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left Column: Controls -->
            <div class="lg:col-span-4 space-y-6">
                <!-- Config Panel -->
                <div class="glass-panel rounded-2xl p-6 shadow-xl">
                    <h2 class="text-lg font-semibold text-white mb-5 flex items-center gap-2">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        Search Bar
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Job Role</label>
                            <input type="text" id="intentInput" value="Intern" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="e.g. Intern, SDE">
                        </div>
                        
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Location Parameter</label>
                            <input type="text" id="locationInput" value="India OR Remote" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="e.g. India, Remote">
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-2 uppercase tracking-wider">Time Filter (LinkedIn)</label>
                            <div class="flex gap-2">
                                <label class="flex-1 cursor-pointer">
                                    <input type="radio" name="timeFilter" value="" class="peer sr-only" checked>
                                    <div class="text-center px-3 py-2 text-sm bg-slate-900 border border-slate-700 rounded-lg text-slate-400 peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-500 transition-all">Any Time</div>
                                </label>
                                <label class="flex-1 cursor-pointer">
                                    <input type="radio" name="timeFilter" value="r86400" class="peer sr-only">
                                    <div class="text-center px-3 py-2 text-sm bg-slate-900 border border-slate-700 rounded-lg text-slate-400 peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-500 transition-all">24 Hours</div>
                                </label>
                                <label class="flex-1 cursor-pointer">
                                    <input type="radio" name="timeFilter" value="r604800" class="peer sr-only">
                                    <div class="text-center px-3 py-2 text-sm bg-slate-900 border border-slate-700 rounded-lg text-slate-400 peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-500 transition-all">7 Days</div>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Add Company -->
                <div class="glass-panel rounded-2xl p-6 shadow-xl relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-500 to-teal-500"></div>
                    <label class="block text-sm font-semibold text-white mb-2">Add to Checkbox Dictionary</label>
                    <p class="text-xs text-slate-400 mb-4">
                        Search LinkedIn for a company, click their "Jobs" tab, and look for <code class="text-emerald-400 bg-slate-800 px-1 rounded">f_C=123456</code> in the URL.
                    </p>
                    <div class="space-y-3">
                        <input type="text" id="companyNameInput" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors" placeholder="Company Name (e.g. Stripe)">
                        
                        <div class="flex gap-2">
                            <input type="text" id="companyIdInput" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors" placeholder="Numeric ID (e.g. 71130)">
                            <button id="addCompanyBtn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2.5 rounded-lg font-semibold transition-colors shadow-lg">Add</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Inventory & Output -->
            <div class="lg:col-span-8 space-y-6">
                <!-- Tracking Grid -->
                <div class="glass-panel rounded-2xl p-6 shadow-xl flex flex-col h-full min-h-[300px]">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold text-white flex items-center gap-2">
                            <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                            Mapped Companies (<span id="companyCount">0</span>)
                        </h2>
                        <button id="clearAllBtn" class="text-xs text-slate-400 hover:text-red-400 transition-colors">Clear All</button>
                    </div>
                    
                    <div id="tagsContainer" class="flex flex-wrap gap-3 flex-grow content-start">
                        <!-- Tags will be injected here -->
                    </div>
                </div>
            </div>
            
            <!-- Bottom Row: Visualizer & Actions -->
            <div class="lg:col-span-12 grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Visualizer -->
                <div class="glass-panel rounded-2xl p-6 shadow-xl relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-indigo-500"></div>
                    <h2 class="text-sm font-semibold text-slate-300 mb-3 flex items-center gap-2 uppercase tracking-wide">
                        <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        Live Parameter Build
                    </h2>
                    <div class="bg-slate-900 rounded-lg p-4 font-mono text-xs text-slate-300 leading-relaxed border border-slate-800 h-32 overflow-y-auto">
                        <div class="mb-2"><span class="text-blue-400"># LinkedIn Params:</span><br><span id="previewLinkedin" class="break-words"></span></div>
                        <div><span class="text-emerald-400"># Google Dork:</span><br><span id="previewGoogle" class="break-words"></span></div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex flex-col gap-4 justify-center">
                    <button id="btnLinkedin" class="relative group overflow-hidden rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-semibold py-4 px-6 shadow-[0_0_20px_rgba(37,99,235,0.3)] transition-all hover:shadow-[0_0_25px_rgba(37,99,235,0.5)] hover:-translate-y-0.5 flex items-center justify-center gap-3">
                        <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out"></div>
                        <svg class="w-6 h-6 relative z-10" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                        <span class="relative z-10 text-lg">Launch Checkbox Filter Pipeline 🚀</span>
                    </button>
                    
                    <button id="btnGoogle" class="relative group overflow-hidden rounded-xl bg-slate-800 border border-slate-600 hover:border-slate-500 hover:bg-slate-700 text-white font-semibold py-4 px-6 shadow-lg transition-all hover:-translate-y-0.5 flex items-center justify-center gap-3">
                        <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <span class="text-lg">Launch Google Index Scraper 🔍</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const STORAGE_KEY = 'job_scraper_companies_v8';
            
            // Pre-seed with the exact requested companies
            const DEFAULT_COMPANIES = [
                {name: "ArGo Intern", id: "309694"},
                {name: "Weekday AI (YC W21)", id: "109068754"},
                {name: "Weekday (YC W21)", id: "9291107"},
                {name: "Human Archive (YC W26)", id: "22688"},
                {name: "Atlassian", id: "79494516"},
                {name: "Airbnb", id: "13237948"},
                {name: "Appbrew", id: "69656080"},
                {name: "American Express Global Business Travel", id: "111507978"},
                {name: "Clinikally (YC S22)", id: "13616753"},
                {name: "JPMorganChase", id: "91421969"},
                {name: "CashKaro.com", id: "28154426"},
                {name: "Cashfree Payments", id: "13367357"},
                {name: "CoinDCX", id: "74489557"},
                {name: "Cars24", id: "3579211"},
                {name: "CareStack™ - Dental Practice Management", id: "80478520"},
                {name: "ClickPost", id: "10429660"},
                {name: "Razorpay Curlec", id: "13330722"},
                {name: "CRED", id: "78697226"},
                {name: "Chatwoot", id: "18125"},
                {name: "Cvent", id: "13183020"},
                {name: "Convin", id: "99126095"},
                {name: "Cloudely, Inc", id: "14485479"},
                {name: "Care.fi", id: "3157038"},
                {name: "Cinder", id: "18073149"},
                {name: "Cube", id: "30241839"},
                {name: "Cleve.ai", id: "1068"},
                {name: "Peakflo (YC W22)", id: "101366370"},
                {name: "Anakin (YC S21)", id: "40909299"},
                {name: "SuperKalam (YC W23)", id: "30944740"},
                {name: "Open (YC W24)", id: "101719175"},
                {name: "Bolna (YC F25)", id: "95767874"},
                {name: "winfunc (YC S24)", id: "105340324"},
                {name: "Hemut (YC X25)", id: "72596476"},
                {name: "Human Archive (YC W26)", id: "111553402"},
                {name: "Gooseworks (YC W23)", id: "100253834"},
                {name: "Yocket", id: "109068754"},
                {name: "Yellow.ai", id: "13184652"},
                {name: "SwiftSku (YC W21)", id: "79632789"},
                {name: "Exly (YC W19)", id: "3882691"}
            ];
            
            // DOM Elements
            const companyNameInput = document.getElementById('companyNameInput');
            const companyIdInput = document.getElementById('companyIdInput');
            const addCompanyBtn = document.getElementById('addCompanyBtn');
            const tagsContainer = document.getElementById('tagsContainer');
            const companyCount = document.getElementById('companyCount');
            const clearAllBtn = document.getElementById('clearAllBtn');
            
            const intentInput = document.getElementById('intentInput');
            const locationInput = document.getElementById('locationInput');
            const timeFilters = document.getElementsByName('timeFilter');
            
            const previewLinkedin = document.getElementById('previewLinkedin');
            const previewGoogle = document.getElementById('previewGoogle');
            
            const btnLinkedin = document.getElementById('btnLinkedin');
            const btnGoogle = document.getElementById('btnGoogle');

            // State
            let companies = [];

            // Initialize
            function init() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        companies = JSON.parse(stored);
                    } catch(e) {
                        companies = JSON.parse(JSON.stringify(DEFAULT_COMPANIES));
                    }
                } else {
                    companies = JSON.parse(JSON.stringify(DEFAULT_COMPANIES));
                }
                
                // Add event listeners
                companyNameInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') companyIdInput.focus();
                });
                companyIdInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') addCompany();
                });
                addCompanyBtn.addEventListener('click', addCompany);
                
                clearAllBtn.addEventListener('click', () => {
                    if(confirm("Clear all companies?")) {
                        companies = [];
                        saveAndRender();
                    }
                });
                
                [intentInput, locationInput].forEach(el => {
                    el.addEventListener('input', updatePreviews);
                });
                
                Array.from(timeFilters).forEach(el => {
                    el.addEventListener('change', updatePreviews);
                });

                btnLinkedin.addEventListener('click', launchLinkedin);
                btnGoogle.addEventListener('click', launchGoogle);

                saveAndRender();
            }

            function addCompany() {
                const name = companyNameInput.value.trim();
                const id = companyIdInput.value.trim();
                
                if (!name) {
                    alert("Company Name is required.");
                    return;
                }
                
                // Remove existing if same name
                companies = companies.filter(c => c.name.toLowerCase() !== name.toLowerCase());
                
                companies.unshift({name, id});
                saveAndRender();
                
                companyNameInput.value = '';
                companyIdInput.value = '';
                companyNameInput.focus();
            }

            function removeCompany(index) {
                companies.splice(index, 1);
                saveAndRender();
            }

            function editCompany(index) {
                const c = companies[index];
                companyNameInput.value = c.name;
                companyIdInput.value = c.id;
                companyIdInput.focus();
            }

            function saveAndRender() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(companies));
                renderTags();
                updatePreviews();
            }

            function renderTags() {
                companyCount.textContent = companies.length;
                tagsContainer.innerHTML = '';
                
                if (companies.length === 0) {
                    tagsContainer.innerHTML = '<div class="text-slate-500 text-sm italic w-full text-center mt-8">No companies configured.</div>';
                    return;
                }

                companies.forEach((company, idx) => {
                    const hasId = !!company.id;
                    
                    const tag = document.createElement('div');
                    // Styling changes if ID is missing
                    const baseClasses = 'group flex items-center gap-2 px-3 py-1.5 rounded-lg border text-sm transition-all shadow-sm';
                    const colorClasses = hasId 
                        ? 'bg-slate-800 border-slate-700 text-slate-200 hover:border-slate-500' 
                        : 'bg-amber-900/20 border-amber-500/50 text-amber-200 hover:border-amber-400';
                        
                    tag.className = `${baseClasses} ${colorClasses}`;
                    
                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'flex flex-col cursor-pointer';
                    infoDiv.onclick = () => editCompany(idx);
                    
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'font-medium';
                    nameSpan.textContent = company.name;
                    
                    const idSpan = document.createElement('span');
                    idSpan.className = `text-[10px] uppercase tracking-wider ${hasId ? 'text-slate-400' : 'text-amber-400 font-bold'}`;
                    idSpan.textContent = hasId ? `ID: ${company.id}` : '⚠️ NEEDS ID';
                    
                    infoDiv.appendChild(nameSpan);
                    infoDiv.appendChild(idSpan);
                    
                    const delBtn = document.createElement('button');
                    delBtn.innerHTML = '<svg class="w-4 h-4 text-slate-500 hover:text-red-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>';
                    delBtn.className = 'focus:outline-none p-1 rounded-md hover:bg-slate-700/50 ml-1 transition-colors';
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        removeCompany(idx);
                    };

                    tag.appendChild(infoDiv);
                    tag.appendChild(delBtn);
                    tagsContainer.appendChild(tag);
                });
            }

            function getLinkedinParams() {
                const intent = intentInput.value.trim() || 'Intern';
                // Only use companies that have an ID configured
                const validIds = companies.filter(c => c.id).map(c => c.id);
                const f_C = validIds.join(',');
                
                return {
                    keywords: intent,
                    f_C: f_C
                };
            }

            function getGoogleQuery() {
                const intent = intentInput.value.trim() || 'Intern';
                const location = locationInput.value.trim() || 'India OR Remote';
                
                // Format names with quotes if they have spaces
                const formattedNames = companies.map(c => c.name.includes(' ') ? `"${c.name}"` : c.name).join(' OR ');
                
                let parts = [`site:linkedin.com/jobs`, `"${intent}"`];
                if (location) {
                    if (location.toUpperCase().includes(' OR ') && !location.startsWith('(')) {
                        parts.push(`(${location})`);
                    } else {
                        parts.push(location.includes(' ') && !location.startsWith('(') && !location.startsWith('"') ? `"${location}"` : location);
                    }
                }
                if (formattedNames) {
                    parts.push(`(${formattedNames})`);
                }
                return parts.join(' ');
            }

            function updatePreviews() {
                const liParams = getLinkedinParams();
                let liStr = `keywords=${encodeURIComponent(liParams.keywords)}`;
                if(liParams.f_C) liStr += `\n&f_C=${encodeURIComponent(liParams.f_C)}`;
                
                previewLinkedin.textContent = liStr;
                previewGoogle.textContent = getGoogleQuery();
            }

            function launchLinkedin() {
                const validIds = companies.filter(c => c.id);
                if (validIds.length === 0) {
                    alert("Please configure at least one company with a valid Numeric ID.");
                    return;
                }
                
                const params = getLinkedinParams();
                const location = locationInput.value.trim();
                let timeFilterValue = '';
                for (const radio of timeFilters) {
                    if (radio.checked) {
                        timeFilterValue = radio.value;
                        break;
                    }
                }

                const url = new URL('https://www.linkedin.com/jobs/search/');
                url.searchParams.set('keywords', params.keywords);
                url.searchParams.set('f_C', params.f_C);
                if (location) url.searchParams.set('location', location);
                if (timeFilterValue) url.searchParams.set('f_TPR', timeFilterValue);

                window.open(url.toString(), '_blank');
            }

            function launchGoogle() {
                if (companies.length === 0) {
                    alert("Please add at least one company.");
                    return;
                }
                const query = getGoogleQuery();
                const url = new URL('https://www.google.com/search');
                url.searchParams.set('q', query);
                window.open(url.toString(), '_blank');
            }

            // Run!
            init();
        });
    </script>
</body>
</html>
